server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # DNS resolver for dynamic upstream resolution
    resolver 127.0.0.11 valid=30s;
    set $api_upstream spawner-api:3000;

    # Vue.js SPA - serve index.html for all routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API REST endpoints
    location /api {
        proxy_pass http://$api_upstream;
        proxy_http_version 1.1;

        # Headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header Cookie $http_cookie;

        # Disable buffering to ensure cookies are passed immediately
        proxy_buffering off;

        # Hide headers that might interfere
        proxy_hide_header X-Powered-By;

        # Do NOT filter any headers from upstream
        proxy_pass_request_headers on;
    }

    # WebSocket support for Socket.IO (terminal feature)
    location /socket.io {
        proxy_pass http://$api_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 86400;
    }
}
