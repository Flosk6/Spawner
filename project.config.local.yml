baseDomain: "localhost"

resources:
  - name: "demo-api"
    type: "laravel-api"
    gitRepo: "https://github.com/laravel/laravel.git"
    defaultBranch: "master"
    dbResource: "demo-db"

  - name: "demo-front"
    type: "nextjs-front"
    gitRepo: "https://github.com/vercel/next.js.git"
    defaultBranch: "canary"
    apiResource: "demo-api"

  - name: "demo-db"
    type: "mysql-db"
