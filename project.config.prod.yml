# Configuration Production pour VPS IONOS
# À copier sur le VPS : /opt/spawner/project.config.yml

baseDomain: "preview.votredomaine.com"  # ← Remplacez par votre domaine

resources:
  # === MAIN STACK ===

  - name: "main-api"
    type: "laravel-api"
    gitRepo: "git@github.com:votre-org/main-api.git"  # ← Votre repo API principale
    defaultBranch: "develop"
    dbResource: "main-db"

  - name: "main-front"
    type: "nextjs-front"
    gitRepo: "git@github.com:votre-org/main-front.git"  # ← Votre repo Front principal
    defaultBranch: "develop"
    apiResource: "main-api"  # ← Se connecte à main-api

  - name: "main-db"
    type: "mysql-db"

  # === MICRO STACK ===

  - name: "micro-api"
    type: "laravel-api"
    gitRepo: "git@github.com:votre-org/micro-api.git"  # ← Votre repo API micro-service
    defaultBranch: "develop"
    dbResource: "micro-db"

  - name: "micro-front"
    type: "nextjs-front"
    gitRepo: "git@github.com:votre-org/micro-front.git"  # ← Votre repo Front micro
    defaultBranch: "develop"
    apiResource: "micro-api"  # ← Se connecte à micro-api

  - name: "micro-db"
    type: "mysql-db"
